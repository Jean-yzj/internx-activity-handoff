<svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans TC','PingFang TC',system-ui,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1861a8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="720" fill="#ffffff"/>
  <text x="500" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#11243f">活動報名・整體串接架構</text>
  <text x="500" y="56" text-anchor="middle" font-size="13" fill="#6b7c93">藍色＝平台既有、可直接重用；金色虛線＝需新增（待補）。「報名者審核」≠「活動發佈審核」。</text>

  <!-- ===== ① 主辦方：建立活動 → 上架 ===== -->
  <text x="16" y="86" font-size="13" font-weight="700" fill="#1861a8">① 主辦方：建立活動 → 上架</text>

  <g font-size="13" fill="#11243f" text-anchor="middle">
    <!-- 1 認證帳號 -->
    <rect x="12" y="96" width="180" height="56" rx="10" fill="#eaf4ff" stroke="#bcdcff"/>
    <text x="102" y="120" font-weight="600">認證帳號</text>
    <text x="102" y="139" font-size="11" fill="#6b7c93">admining / verified-creator</text>
    <!-- 2 建立活動編輯器 -->
    <rect x="208" y="96" width="180" height="56" rx="10" fill="#eaf4ff" stroke="#bcdcff"/>
    <text x="298" y="120" font-weight="600">建立活動編輯器</text>
    <text x="298" y="139" font-size="11" fill="#6b7c93">AddActivity.tsx</text>
    <!-- 3 票券設定 (待補) -->
    <rect x="404" y="96" width="180" height="56" rx="10" fill="#fff8e7" stroke="#f0d488"/>
    <text x="494" y="120" font-weight="600">票券設定</text>
    <text x="494" y="139" font-size="11" fill="#9a7a14">販售時間 × 數量 × 售完</text>
    <!-- 4 報名表單 -->
    <rect x="600" y="96" width="180" height="56" rx="10" fill="#eaf4ff" stroke="#bcdcff"/>
    <text x="690" y="120" font-weight="600">報名表單</text>
    <text x="690" y="139" font-size="11" fill="#6b7c93">FormBuilder（可拖曳）</text>
    <!-- 5 送審上架 -->
    <rect x="796" y="96" width="192" height="56" rx="10" fill="#eaf4ff" stroke="#bcdcff"/>
    <text x="892" y="120" font-weight="600">送審上架</text>
    <text x="892" y="139" font-size="11" fill="#6b7c93">approvalStatus</text>
  </g>
  <g stroke="#1861a8" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="193" y1="124" x2="206" y2="124"/>
    <line x1="389" y1="124" x2="402" y2="124"/>
    <line x1="585" y1="124" x2="598" y2="124"/>
    <line x1="781" y1="124" x2="794" y2="124"/>
  </g>

  <!-- 送審上架 -> 上架 gate (elbow) -->
  <path d="M892,152 L892,176 L770,176" stroke="#1861a8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- publish gate box -->
  <rect x="230" y="170" width="540" height="54" rx="10" fill="#0182fd" stroke="#0166cc"/>
  <text x="500" y="192" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">活動發佈審核（approvalStatus）= 平台審「活動能否上架」</text>
  <text x="500" y="211" text-anchor="middle" font-size="11.5" fill="#dCEBFF">既有機制 · 與下方「報名者審核」是兩回事</text>

  <!-- down to hub -->
  <line x1="500" y1="224" x2="500" y2="332" stroke="#1861a8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- ===== HUB：活動公開頁 ===== -->
  <rect x="358" y="335" width="284" height="132" rx="14" fill="#11243f"/>
  <text x="500" y="372" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">活動公開頁</text>
  <text x="500" y="393" text-anchor="middle" font-size="12.5" fill="#9fc3ff">activity/[id]　·　Registration.tsx</text>
  <!-- gold pill -->
  <rect x="396" y="410" width="208" height="34" rx="17" fill="#fffdf5" stroke="#ffd700" stroke-width="2"/>
  <text x="500" y="432" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">選票 + 報名 → 防超賣</text>

  <!-- ===== spokes ===== -->
  <g stroke="#9bb4d4" stroke-width="1.6" fill="none">
    <line x1="358" y1="401" x2="324" y2="305"/>
    <line x1="358" y1="401" x2="324" y2="425"/>
    <line x1="358" y1="430" x2="324" y2="545"/>
    <line x1="642" y1="401" x2="676" y2="305"/>
    <line x1="642" y1="401" x2="676" y2="425"/>
    <line x1="642" y1="430" x2="676" y2="545"/>
  </g>

  <!-- LEFT cards = 既有，可重用 -->
  <text x="20" y="258" font-size="13" font-weight="700" fill="#1861a8">沿用（既有系統）</text>
  <g>
    <rect x="20" y="270" width="304" height="70" rx="11" fill="#f7faff" stroke="#bcdcff"/>
    <text x="38" y="298" font-size="14.5" font-weight="700" fill="#11243f">活動本體</text>
    <text x="38" y="320" font-size="11.5" fill="#6b7c93">data/activity.ts</text>
    <text x="306" y="320" text-anchor="end" font-size="11" fill="#9aa7b8">activityType / approvalStatus</text>

    <rect x="20" y="390" width="304" height="70" rx="11" fill="#f7faff" stroke="#bcdcff"/>
    <text x="38" y="418" font-size="14.5" font-weight="700" fill="#11243f">報名表單</text>
    <text x="38" y="440" font-size="11.5" fill="#6b7c93">internx_form / FormBuilder</text>
    <text x="306" y="440" text-anchor="end" font-size="11" fill="#9aa7b8">formSchema 渲染</text>

    <rect x="20" y="510" width="304" height="70" rx="11" fill="#fffdf5" stroke="#f0d488" stroke-dasharray="5 4"/>
    <text x="38" y="538" font-size="14.5" font-weight="700" fill="#11243f">話題牆 NeedsWall</text>
    <text x="38" y="560" font-size="11.5" fill="#9a7a14">NeedsWall / ChatRoom（既有）</text>
    <text x="306" y="560" text-anchor="end" font-size="11" fill="#b58a14">待補串接</text>
  </g>

  <!-- RIGHT cards = 待補（這次要做的） -->
  <text x="676" y="258" font-size="13" font-weight="700" fill="#b58a14">這次新做（待補）</text>
  <g>
    <rect x="676" y="270" width="304" height="70" rx="11" fill="#fffdf5" stroke="#f0d488" stroke-dasharray="5 4"/>
    <text x="694" y="298" font-size="14.5" font-weight="700" fill="#11243f">票券引擎</text>
    <text x="694" y="320" font-size="11.5" fill="#9a7a14">data/ticket.ts · ticketStatus()</text>

    <rect x="676" y="390" width="304" height="70" rx="11" fill="#fffdf5" stroke="#f0d488" stroke-dasharray="5 4"/>
    <text x="694" y="414" font-size="14.5" font-weight="700" fill="#11243f">報名者審核（狀態機）</text>
    <text x="694" y="436" font-size="11.5" fill="#9a7a14">Registration.status</text>
    <text x="694" y="453" font-size="11" fill="#b58a14">待審核 → 已通過 → 待繳費 → 已付款</text>

    <rect x="676" y="510" width="304" height="70" rx="11" fill="#fffdf5" stroke="#f0d488" stroke-dasharray="5 4"/>
    <text x="694" y="538" font-size="14.5" font-weight="700" fill="#11243f">平台代收代付</text>
    <text x="694" y="560" font-size="11.5" fill="#9a7a14">Payments + Cloud Functions → 自動 paid</text>
  </g>

  <!-- ===== legend ===== -->
  <g font-size="12" fill="#5b6b7f">
    <rect x="300" y="628" width="22" height="14" rx="4" fill="#eaf4ff" stroke="#bcdcff"/>
    <text x="330" y="639">既有系統，可直接重用</text>
    <rect x="520" y="628" width="22" height="14" rx="4" fill="#fffdf5" stroke="#f0d488" stroke-dasharray="5 4"/>
    <text x="550" y="639">待補（需新增欄位／方法／規則）</text>
  </g>
  <text x="500" y="680" text-anchor="middle" font-size="11.5" fill="#9aa7b8">票券引擎、報名者狀態機、防超賣、金流 Functions、通知與話題牆串接詳見 INTEGRATION.md 對應章節</text>
</svg>
